Nome: Implantar Lovable via FTP na Hostinger


sobre:

  empurrar:

    ramos: ["principal"]

  despacho de fluxo de trabalho:


empregos:

  construir e implantar:

    executa em: ubuntu-latest


    passos:

      - nome: Finalizar compra

        utiliza: ações/checkout@v4


      - nome: Configurar Node.js

        utiliza: actions/setup-node@v4

        com:

          versão do nó: "20"

          cache: "npm"


      - nome: Instalar dependências

        execute: npm ci --legacy-peer-deps


      - nome: Construir

        executar: npm run build


      - nome: Criar .htaccess SPA

        executar: |

          cat > dist/.htaccess << 'EOF'

          <IfModule mod_rewrite.c>

            Reescrever mecanismo ligado

            ReescreverBase /

            RewriteRule ^index\.html$ - [L]

            RewriteCond %{REQUEST_FILENAME} !-f

            RewriteCond %{REQUEST_FILENAME} !-d

            RewriteRule . /index.html [L]

          </IfModule>

          Fim do jogo


      - nome: Implantar via FTP

        utiliza: SamKirkland/FTP-Deploy-Action@v4.3.6

        com:

          servidor: ${{ secrets.FTP_HOST }}

          nome de usuário: ${{ secrets.FTP_USER }}

          senha: ${{ secrets.FTP_PASS }}

          protocolo: ftp

          porta: 21

          diretório-local: dist/

          diretório-do-servidor: /

          tempo limite: 120000

          perigosa-limpeza-da-pérola: falso

          teste: falso

          nível de registro: detalhado

          excluir: |

            **/.git*

            **/.git**

            **/.github/**

            **/node_modules/**

